name: Build Humsafar APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [humsafar_rider, humsafar_driver]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate Android platform files
        working-directory: ${{ matrix.app }}
        run: flutter create --org app.humsafar --project-name ${{ matrix.app }} --platforms android .

      - name: Add Android permissions
        working-directory: ${{ matrix.app }}
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <application|' $MANIFEST
          sed -i 's|<application|<application android:usesCleartextTraffic="true"|' $MANIFEST

      - name: Get dependencies
        working-directory: ${{ matrix.app }}
        run: flutter pub get

      - name: Build release APK
        working-directory: ${{ matrix.app }}
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-release-apk
          path: ${{ matrix.app }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
